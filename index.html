<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central da Guitarra</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    min-height: 100%;
    background: #0a0a0a;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 48px 16px;
    font-family: Georgia, 'Times New Roman', serif;
  }

  .card {
    width: 100%;
    max-width: 360px;
    background: #0a0a0a;
    border: 1px solid #c9a24b;
    border-radius: 20px;
    padding: 36px 24px 28px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title {
    color: #f2e3bb;
    font-size: 19px;
    letter-spacing: 1px;
    margin: 0 0 4px;
  }

  .subtitle {
    color: #9c8a5e;
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    margin: 0 0 26px;
  }

  .btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    padding: 14px 16px;
    border-radius: 10px;
    text-decoration: none;
    font-family: Arial, sans-serif;
    margin-bottom: 12px;
  }

  .btn:last-child {
    margin-bottom: 0;
  }

  .btn-outline {
    border: 1px solid #c9a24b;
    color: #c9a24b;
  }

  .btn-solid {
    background: #c9a24b;
    border: 1px solid #c9a24b;
  }

  .btn-title {
    display: block;
    font-size: 14px;
    font-weight: bold;
    line-height: 1.3;
  }

  .btn-solid .btn-title {
    color: #1f1605;
  }

  .btn-sub {
    display: block;
    font-size: 11.5px;
    margin-top: 4px;
    font-weight: normal;
  }

  .btn-outline .btn-sub {
    color: #9c8a5e;
  }

  .btn-solid .btn-sub {
    color: #4a3a14;
  }
</style>
</head>
<body>

<div class="card">

  <svg width="92" height="92" viewBox="0 0 680 680" style="margin-bottom:18px;">
    <circle cx="340" cy="340" r="320" fill="#0a0a0a" stroke="#c9a24b" stroke-width="6"/>
    <circle cx="340" cy="340" r="295" fill="none" stroke="#c9a24b" stroke-width="1.5"/>
    <defs><path id="ta" d="M 110,340 A 230,230 0 0 1 570,340" fill="none"/></defs>
    <text font-family="Georgia, serif" font-size="34" letter-spacing="4" fill="#c9a24b">
      <textPath href="#ta" startOffset="50%" text-anchor="middle">CENTRAL DA GUITARRA</textPath>
    </text>
    <g transform="translate(340,400) rotate(-18)">
      <rect x="-9" y="-180" width="18" height="120" rx="3" fill="none" stroke="#c9a24b" stroke-width="3"/>
      <rect x="-26" y="-66" width="52" height="14" fill="none" stroke="#c9a24b" stroke-width="3"/>
      <path d="M -60,-52 C -85,-30 -85,10 -55,30 C -30,46 -10,40 0,52 C 10,40 30,46 55,30 C 85,10 85,-30 60,-52 C 35,-66 -35,-66 -60,-52 Z" fill="none" stroke="#c9a24b" stroke-width="3"/>
      <circle cx="0" cy="-2" r="22" fill="none" stroke="#c9a24b" stroke-width="2"/>
    </g>
  </svg>

  <p class="title">Central da Guitarra</p>
  <p class="subtitle">TEORIA &middot; T&Eacute;CNICA &middot; TIMBRE</p>

  <a class="btn btn-outline" href="https://hotm.io/9DQpR5r" target="_blank" rel="noopener">
    <span class="btn-title">Ampero II Stomp - Essential Tones Preset Pack</span>
    <span class="btn-sub">Presets prontos para timbres profissionais</span>
  </a>

  <a class="btn btn-solid" href="https://hotm.io/ne03oHv1" target="_blank" rel="noopener">
    <span class="btn-title">M&eacute;todo Subindo o Tom</span>
    <span class="btn-sub">Evolua sua t&eacute;cnica e se torne o guitarrista que voc&ecirc; quer ser</span>
  </a>

</div>

</body>
</html>
